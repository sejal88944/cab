name: Build Artifacts (CD)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Install backend
        run: npm ci --prefix Backend

      - name: Test backend
        run: npm test --prefix Backend

      - name: Package artifacts
        shell: bash
        run: |
          rm -rf artifact_out
          mkdir -p artifact_out/frontend
          mkdir -p artifact_out/backend
          cp -r frontend/dist artifact_out/frontend/dist
          cp -r Backend artifact_out/backend
          tar -czf release.tgz -C artifact_out .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rideeasy-release
          path: release.tgz
          retention-days: 7

