<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RideEasy — Offline</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #e5f9f0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        max-width: 420px;
        padding: 24px 20px 20px;
        border-radius: 20px;
        background: radial-gradient(circle at top left, #10b98133, #020617);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.9);
        text-align: center;
      }
      h1 {
        font-size: 1.4rem;
        margin-bottom: 8px;
      }
      p {
        font-size: 0.9rem;
        line-height: 1.5;
        color: #cbd5f5;
        margin: 4px 0;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.75rem;
        background: rgba(15, 118, 110, 0.1);
        color: #6ee7b7;
        margin-bottom: 10px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #f97316;
      }
      button {
        margin-top: 14px;
        padding: 10px 18px;
        border-radius: 999px;
        border: none;
        font-size: 0.9rem;
        font-weight: 600;
        background: #10b981;
        color: #022c22;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">
        <span class="dot"></span>
        Offline mode
      </div>
      <h1>You are currently offline</h1>
      <p>RideEasy can&apos;t reach the server right now.</p>
      <p>You can still open the app from your home screen and we&apos;ll sync your rides as soon as you&apos;re back online.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
  </html>
